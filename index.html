<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobile Number Verification</title>
    <style>
        /* Modern Design System with Dynamic Mesh Pastels */
        :root {
            --bg-gradient: radial-gradient(at 0% 0%, #ffedd5 0px, transparent 50%),
                           radial-gradient(at 50% 0%, #e0e7ff 0px, transparent 50%),
                           radial-gradient(at 100% 0%, #f0fdf4 0px, transparent 50%),
                           radial-gradient(at 0% 100%, #fef08a 0px, transparent 50%),
                           radial-gradient(at 100% 100%, #fae8ff 0px, transparent 50%),
                           #f8fafc;
            
            --card-bg: rgba(255, 255, 255, 0.85);
            --primary-color: #0f172a;   /* Slate Deep Dark */
            --accent-gradient: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            --accent-hover: linear-gradient(135deg, #4f46e5 0%, #9333ea 100%);
            --text-muted: #475569;      /* Accessible description gray */
            --border-color: rgba(203, 213, 225, 0.7);
            --success-color: #059669;   /* Emerald Green */
            --error-color: #dc2626;     /* Crimson Red */
            --focus-ring: rgba(99, 102, 241, 0.25);
        }

        body {
            font-family: 'Plus Jakarta Sans', 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg-gradient);
            color: var(--primary-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Container with Gradient Mesh Border effect */
        .card-wrapper {
            position: relative;
            background: linear-gradient(135deg, rgba(255,255,255,0.4) 0%, rgba(255,255,255,0.1) 100%);
            padding: 1px;
            border-radius: 24px;
            box-shadow: 0 20px 40px -15px rgba(79, 70, 229, 0.15),
                        0 0 100px -30px rgba(168, 85, 247, 0.15);
            max-width: 420px;
            width: 100%;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

        /* Glassmorphism Inner Card Layout */
        .login-card {
            background-color: var(--card-bg);
            padding: 40px 35px;
            border-radius: 23px;
            box-sizing: border-box;
        }

        .icon-header {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
        }

        .icon-badge {
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.1) 0%, rgba(168, 85, 247, 0.1) 100%);
            color: #6366f1;
            padding: 14px;
            border-radius: 16px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        h1 {
            font-size: 1.6rem;
            font-weight: 800;
            margin: 0 0 10px 0;
            text-align: center;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #1e293b 0%, #475569 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            font-size: 0.925rem;
            color: var(--text-muted);
            text-align: center;
            margin-bottom: 32px;
            line-height: 1.5;
        }

        /* Form Layout elements */
        .form-group {
            display: flex;
            flex-direction: column;
            margin-bottom: 24px;
        }

        label {
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
            color: var(--text-muted);
            padding-left: 2px;
        }

        /* Styled Phone input prefix container */
        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            box-shadow: 0 2px 6px rgba(15, 23, 42, 0.02);
            border-radius: 12px;
            background-color: #fff;
            transition: all 0.2s ease;
            border: 1.5px solid var(--border-color);
        }

        .input-wrapper:focus-within {
            border-color: #6366f1;
            box-shadow: 0 0 0 4px var(--focus-ring);
        }

        .country-prefix {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 0 14px 0 16px;
            font-size: 1rem;
            font-weight: 600;
            color: #1e293b;
            border-right: 1.5px solid var(--border-color);
            user-select: none;
            height: 100%;
        }

        .flag-icon {
            width: 18px;
            height: 13px;
            object-fit: cover;
            border-radius: 2px;
        }

        input[type="text"] {
            font-family: inherit;
            width: 100%;
            padding: 15px 16px; 
            font-size: 1.15rem;
            font-weight: 600;
            letter-spacing: 1.5px;
            border: none;
            background: transparent;
            color: var(--primary-color);
            box-sizing: border-box;
            border-radius: 0 12px 12px 0;
        }

        input[type="text"]:focus {
            outline: none;
        }

        input[type="text"]::placeholder {
            color: #cbd5e1;
            letter-spacing: 1px;
            font-weight: 400;
        }

        /* Dynamic Feedback Message Container */
        .feedback-message {
            font-size: 0.85rem;
            margin-top: 10px;
            font-weight: 600;
            display: none;
            align-items: center;
            gap: 6px;
            text-align: left;
            padding-left: 2px;
        }

        .form-group.invalid .input-wrapper {
            border-color: var(--error-color);
            background-color: #fff5f5;
        }
        .form-group.invalid .feedback-message {
            display: flex;
            color: var(--error-color);
        }

        .form-group.valid .input-wrapper {
            border-color: var(--success-color);
            background-color: #f0fdf4;
        }
        .form-group.valid .feedback-message {
            display: flex;
            color: var(--success-color);
        }

        /* Submit Button Styling */
        button[type="submit"] {
            width: 100%;
            padding: 16px;
            font-size: 1rem;
            font-weight: 700;
            background: var(--accent-gradient);
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 14px rgba(99, 102, 241, 0.35);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        button[type="submit"]:hover {
            background: var(--accent-hover);
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.45);
        }

        button[type="submit"]:active {
            transform: translateY(1px);
            box-shadow: 0 3px 10px rgba(99, 102, 241, 0.3);
        }
    </style>
</head>

<body>

    <div class="card-wrapper">
        <div class="login-card">
            <div class="icon-header">
                <div class="icon-badge">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><circle cx="12" cy="11" r="1"/><path d="m12 12 1 2.5h-2Z"/></svg>
                </div>
            </div>
            <h1>Secure Verification</h1>
            <div class="subtitle">Enter your 10-digit mobile number to gain authenticated workspace access.</div>

            <form method="post" name="logon" id="logonForm" novalidate>
                <div class="form-group" id="phoneGroup">
                    <label for="mobileno">Mobile Number</label>
                    <div class="input-wrapper">
                        <span class="country-prefix">
                            <img class="flag-icon" src="https://flagcdn.com/w40/in.png" alt="India Flag">
                            +91
                        </span>
                        <input type="text" id="mobileno" name="mobileno" maxlength="10" placeholder="00000 00000" autocomplete="off" required>
                    </div>
                    <span class="feedback-message" id="feedbackMessage"></span>
                </div>

                <button type="submit" name="Login">
                    <span>Get Verification Code</span>
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
                </button>
            </form>
        </div>
    </div>

    <script>
        // Automatic runtime window input balancing focus
        window.addEventListener('DOMContentLoaded', () => {
            document.getElementById('mobileno').focus();
        });

        const form = document.getElementById('logonForm');
        const phoneInput = document.getElementById('mobileno');
        const phoneGroup = document.getElementById('phoneGroup');
        const feedback = document.getElementById('feedbackMessage');

        form.addEventListener('submit', function (event) {
            event.preventDefault(); 
            
            const rawValue = phoneInput.value.trim();
            const phoneRegex = /^\d{10}$/;

            phoneGroup.classList.remove('invalid', 'valid');

            if (phoneRegex.test(rawValue)) {
                phoneGroup.classList.add('valid');
                feedback.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg> Valid mobile number verified.`;
                
                setTimeout(() => {
                    alert("Validation Complete! Routing secure token initialization...");
                }, 400);
            } else {
                phoneGroup.classList.add('invalid');
                feedback.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg> Please enter a valid 10-digit number.`;
                phoneInput.focus();
            }
        });

        // Numerical entry clamping
        phoneInput.addEventListener('input', function(e) {
            this.value = this.value.replace(/\D/g, '');
        });
    </script>

</body>
</html>
